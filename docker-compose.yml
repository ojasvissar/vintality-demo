services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vintality-db
    environment:
      POSTGRES_DB: vintality
      POSTGRES_USER: vintality
      POSTGRES_PASSWORD: vintality_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/seed/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vintality"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
